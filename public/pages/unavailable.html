<!DOCTYPE html>
<html lang="en" class="home">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Veltrix</title>
  <link rel="icon" href="../assets/MainLogo.png" type="image/png">
  <link rel="stylesheet" href="../styles/styleHomepage.css" />
  <link rel="stylesheet" href="../styles/style.css" />
  <link rel="stylesheet" href="../styles/footer.css" />
  <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
  <script src="https://kit.fontawesome.com/1165876da6.js" crossorigin="anonymous"></script>
  <style>
    main.unavailable-main {
      position: relative !important;
      isolation: isolate;
      top: 0 !important;
      min-height: 100vh;
      padding-top: 15vh;
      width: 100vw;
      max-width: 100vw;
      margin-left: calc(50% - 50vw);
      margin-right: calc(50% - 50vw);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      gap: 24px;
      text-align: center;
      background: #000;
    }

    main.unavailable-main::before,
    main.unavailable-main::after {
      content: '';
      position: absolute;
      top: 0;
      bottom: 0;
      left: 50%;
      width: 100vw;
      transform: translateX(-50%);
      background-image: url(../assets/Veltrix-homepage-background.png);
      background-repeat: repeat-y;
      background-size: 100vw auto;
      background-position: var(--bg-y-pos, center 0);
      pointer-events: none;
      z-index: 0;
    }

    main.unavailable-main::after {
      display: none;
    }

    main.unavailable-main > * {
      position: relative;
      z-index: 1;
    }

    .unavailable-title {
      width: 100%;
      margin: -10px 0 0;
      text-align: center;
      font-family: 'MiniPixel', sans-serif;
      font-size: 100px;
      font-weight: 700;
      line-height: 1;
      color: #f5eded;
    }

    .unavailable-card {
      width: min(90vw, 720px);
      padding: 40px 32px;
      background: #1d1d1f;
      border: 1px solid #444;
      border-radius: 18px;
    }

    .unavailable-card p {
      font-size: 20px;
      margin: 0;
      color: #fff;
    }

    .unavailable-home-link {
      position: relative;
      display: inline-block;
      margin-top: 24px;
      padding: 14px 24px;
      background: #000;
      border: 1px solid #444;
      border-radius: 12px;
      color: #fff;
      text-decoration: none;
      font-size: 20px;
      transition: background-color 0.3s ease, transform 0.25s ease;
    }

    .unavailable-home-link::after {
      content: '';
      position: absolute;
      top: -1px;
      left: -1px;
      right: -1px;
      bottom: -1px;
      border-radius: inherit;
      border: 1px solid transparent;
      animation: veltrixGlow 2s infinite alternate;
      opacity: 0;
      transition: opacity 0.3s ease;
      pointer-events: none;
    }

    .unavailable-home-link:hover,
    .unavailable-home-link:focus-visible {
      background: #1d1d1d;
      transform: translateY(-2px);
      outline: none;
    }

    .unavailable-home-link:hover::after,
    .unavailable-home-link:focus-visible::after {
      opacity: 1;
    }
  </style>
</head>
<body>
  <header></header>

  <div class="search-container">
    <input type="text" placeholder="Search..." class="search-bar" id="Search_Input">
    <button class="search-close">×</button>
  </div>

  <main class="unavailable-main">
    <h1 class="unavailable-title">Not Available</h1>
    <section class="unavailable-card">
      <p>This page is not available right now</p>
      <a class="unavailable-home-link" href="/pages/index.html">Back to Home</a>
    </section>
  </main>

  <div id="footer"></div>

  <script src="../scripts/header.js"></script>
  <script src="../scripts/footer.js"></script>
  <script src="../scripts/animations.js" defer></script>
</body>
</html>
