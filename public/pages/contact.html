    <script>
        window.onload = function() {
            document.getElementById("contactForm").addEventListener("submit", async function(event) {
                event.preventDefault();

                const formData = new FormData(this);
                const payload = Object.fromEntries(formData.entries());
                const statusMsg = document.getElementById("statusMsg");
                const emailPattern = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
                const getCsrfToken = () => {
                    const metaToken = document.querySelector('meta[name="csrf-token"]')?.getAttribute('content');
                    if (metaToken) return metaToken;

                    const cookieMatch = document.cookie.match(/(?:^|;\s*)XSRF-TOKEN=([^;]+)/);
                    return cookieMatch ? decodeURIComponent(cookieMatch[1]) : "";
                };

                if (!emailPattern.test((payload.email || '').trim())) {
                    statusMsg.innerHTML = "Please enter a valid email format.";
                    return;
                }

                try {
                    const response = await fetch('/contact-queries', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json',
                            'Accept': 'application/json',
                            ...(getCsrfToken() ? { 'X-CSRF-TOKEN': getCsrfToken() } : {})
                        },
                        body: JSON.stringify(payload)
                    });

                    if (!response.ok) {
                        const errorPayload = await response.json().catch(() => null);
                        throw new Error(errorPayload?.message || 'Failed to send message');
                    }

                    statusMsg.innerHTML =
                        "Your message has been sent";
                    this.reset();
                } catch (error) {
                    statusMsg.innerHTML =
                        error.message === 'The email field must be a valid email address.'
                            ? "Please enter a valid email format."
                            : "Failed to send message. Please try again.";
                    console.log("FAILED...", error);
                }
            });
        };
    </script>
