<!DOCTYPE html>
<html lang="en" class="home">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>All Products</title>
  <link rel="stylesheet" href="../styles/style.css" />
  <link rel="stylesheet" href="../styles/ShopAll.css" />
  <!-- Icons -->
  <script src="https://kit.fontawesome.com/1165876da6.js" crossorigin="anonymous"></script>
</head>

<body>

  <header></header>

  <main>
    <h1 style="width: 100%; text-align: center; font-size: 5em;" id="title">All Products</h1>

    <div id="sort_container" style="width:100%; text-align:center;">
      <div class="custom-select" style="display:inline-block; position:relative; text-align:left;">
        <select id="sort_products" style="display:none;">
          <option value="default">Default</option>
          <option value="price_low">Price Low → High</option>
          <option value="price_high">Price High → Low</option>
        </select>

        <div class="select-selected">
          <span class="val">Default</span>
        </div>

        <div class="select-items select-hide">
          <div data-value="price_low">Price Low → High</div>
          <div data-value="price_high">Price High → Low</div>
        </div>
      </div>
    </div>

    <script>
      document.addEventListener("DOMContentLoaded", function () {
        const customSelect = document.querySelector(".custom-select");
        const selectedDiv = customSelect.querySelector(".select-selected");
        const valSpan = selectedDiv.querySelector(".val");
        const itemsDiv = customSelect.querySelector(".select-items");
        const nativeSelect = document.getElementById("sort_products");
        const itemDivs = itemsDiv.querySelectorAll("div");

        // Toggle list open/close
        selectedDiv.addEventListener("click", function (e) {
          e.stopPropagation();
          itemsDiv.classList.toggle("select-hide");
          selectedDiv.classList.toggle("select-arrow-active");

          if (!itemsDiv.classList.contains("select-hide")) {
            const currentChildren = Array.from(itemsDiv.children);
            const visibleChildren = currentChildren.filter(d => d.style.display !== "none");

            // Reset all borders
            currentChildren.forEach(d => {
              d.style.borderTopLeftRadius = "0";
              d.style.borderTopRightRadius = "0";
              d.style.borderBottomLeftRadius = "0";
              d.style.borderBottomRightRadius = "0";
            });

            // Apply rounding to first and last visible item
            if (visibleChildren.length > 0) {
              visibleChildren[0].style.borderTopLeftRadius = "9px";
              visibleChildren[0].style.borderTopRightRadius = "9px";
              visibleChildren[visibleChildren.length - 1].style.borderBottomLeftRadius = "9px";
              visibleChildren[visibleChildren.length - 1].style.borderBottomRightRadius = "9px";
            }
          }
        });

        // Handle option clicks
        itemDivs.forEach(item => {
          item.addEventListener("click", function (e) {
            e.stopPropagation();
            const value = this.getAttribute("data-value");
            const text = this.innerHTML;

            // Update custom selected text
            valSpan.innerHTML = text;

            // Update natively hidden select and trigger change event for products.js
            Array.from(nativeSelect.options).forEach(opt => {
              if (opt.value === value) {
                opt.selected = true;
              }
            });
            nativeSelect.dispatchEvent(new Event('change'));

            // Update custom list options to hide the active one
            // First, reset all original divs
            itemDivs.forEach(div => div.style.display = "block");

            // Check if Default option was injected dynamically earlier
            let injectedDefault = itemsDiv.querySelector('div[data-value="default"]');
            if (injectedDefault) {
              injectedDefault.style.display = "block";
            }

            this.style.display = "none"; // Hide currently selected

            // Ensure 'Default' option is available to switch back to if we aren't on it
            if (value !== 'default') {
              let defaultOpt = itemsDiv.querySelector('div[data-value="default"]');
              if (!defaultOpt) {
                defaultOpt = document.createElement('div');
                defaultOpt.setAttribute('data-value', 'default');
                defaultOpt.innerHTML = 'Default';
                defaultOpt.addEventListener('click', itemClickReset);
                itemsDiv.prepend(defaultOpt);
              }
            } else {
              let defaultOpt = itemsDiv.querySelector('div[data-value="default"]');
              if (defaultOpt) defaultOpt.style.display = 'none';
            }

            // Close the dropdown
            closeAllSelect();
          });
        });

        function itemClickReset(e) {
          e.stopPropagation();
          const value = this.getAttribute("data-value");
          const text = this.innerHTML;
          valSpan.innerHTML = text;
          nativeSelect.value = value;
          nativeSelect.dispatchEvent(new Event('change'));

          // Reset all static items
          itemDivs.forEach(div => div.style.display = "block");

          // Re-hide the default option since we are selecting it
          let injectedDefault = itemsDiv.querySelector('div[data-value="default"]');
          if (injectedDefault) {
            injectedDefault.style.display = "none";
          }

          closeAllSelect();
        }

        // Close dropdown if clicking outside
        function closeAllSelect() {
          itemsDiv.classList.add("select-hide");
          selectedDiv.classList.remove("select-arrow-active");
        }
        document.addEventListener("click", closeAllSelect);

        // Initial setup for default option
        let defaultOpt = document.createElement('div');
        defaultOpt.setAttribute('data-value', 'default');
        defaultOpt.innerHTML = 'Default';
        defaultOpt.style.display = 'none'; // Hidden initially
        defaultOpt.addEventListener('click', itemClickReset);
        itemsDiv.prepend(defaultOpt);
      });
    </script>

    <!-- Loading message -->
    <div id="loading_products" style="text-align:center; font-size:1.2em; margin-bottom:20px;">
      Loading products...
    </div>

    <section id="products_container">
      <template>
        <div class="product_card" data-name="Game Headset" data-price="59.99">
          <img class="product_image" alt="Product image" />
          <h3 class="product_name"></h3>
          <span class="product_price"></span>
          <button class="view_product">View Product</button>
          <button class="add_to_basket">Add to Basket</button>
        </div>
      </template>

    </section>

    <section class="shop-category-tabs" aria-labelledby="shop-category-tabs-title">
      <div class="shop-category-tabs__inner">
        <p class="shop-category-tabs__eyebrow">Quick navigation</p>
        <h2 id="shop-category-tabs-title">Browse by category</h2>
        <div class="shop-category-tabs__list" id="shop-category-tabs-list">
          <a href="ShopAll.html" data-category-tab="all">All Products</a>
          <a href="ShopAll.html?category=Video%20Games" data-category-tab="Video Games">Video Games</a>
          <a href="ShopAll.html?category=Consoles%20and%20PCs" data-category-tab="Consoles and PCs">Consoles and PCs</a>
          <a href="ShopAll.html?category=Accessories" data-category-tab="Accessories">Accessories</a>
          <a href="ShopAll.html?category=Gaming%20Chairs%20and%20Desks" data-category-tab="Gaming Chairs and Desks">Gaming Chairs and Desks</a>
          <a href="ShopAll.html?category=Monitors%20and%20Displays" data-category-tab="Monitors and Displays">Monitors and Displays</a>
        </div>
      </div>
    </section>
  </main>




  <script src="../scripts/header.js"></script>
  <script src="../scripts/animations.js" defer></script>
  <script src="../scripts/products.js?v=8"></script>
  <script>
    (function () {
      const activeCategory = new URLSearchParams(window.location.search).get("category") || "all";
      const categoryTabs = document.querySelectorAll("[data-category-tab]");
      categoryTabs.forEach((tab) => {
        const tabCategory = tab.getAttribute("data-category-tab");
        if (tabCategory === activeCategory || (activeCategory === "all" && tabCategory === "all")) {
          tab.classList.add("is-active");
          tab.setAttribute("aria-current", "page");
        }
      });

      const query = (localStorage.getItem("veltrix_search_query") || "").trim().toLowerCase();
      if (!query) return;

      function applyFilter() {
        const cards = document.querySelectorAll(".product_card");
        if (!cards.length) return false;

        let shown = 0;
        cards.forEach(card => {
          const name = (card.dataset.name || "").toLowerCase();
          const match = name.includes(query);
          card.style.display = match ? "" : "none";
          if (match) shown++;
        });

        const title = document.getElementById("title");
        if (title) title.textContent = `Results for "${query}" (${shown})`;

        return true;
      }

      // Try now
      if (applyFilter()) return;

      // If products.js injects cards later, watch for it
      const container = document.getElementById("products_container");
      if (!container) return;

      const observer = new MutationObserver(() => {
        if (applyFilter()) observer.disconnect();
      });

      observer.observe(container, { childList: true, subtree: true });
    })();
  </script>




</body>

</html>
